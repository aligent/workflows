extends: default
rules:
  document-start: disable
  trailing-spaces: disable
  line-length:
    max: 120
  truthy:
    allowed-values: ["true", "false", "on"]
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
    level: warning
  comments:
    min-spaces-from-content: 1
    require-starting-space: false # Dependabot requires comments like "#v6.0.0"
