name: 🛍️ Magento Cloud Deployment

on:
  workflow_call:
    inputs:
      # Magento Cloud Configuration
      magento-cloud-project-id:
        description: "Magento Cloud project ID (required)"
        type: string
        required: true
      environment:
        description: "Target environment (integration/staging/production)"
        type: string
        required: false
        default: "integration"
      
      # Monitoring and Reporting
      newrelic-app-id:
        description: "NewRelic application ID for deployment markers (optional)"
        type: string
        required: false
        default: ""
      
      # CST Reporting Configuration
      cst-endpoint:
        description: "CST endpoint base URL (optional, overrides workspace variable)"
        type: string
        required: false
        default: ""
      cst-project-key:
        description: "CST project key (optional, overrides workspace variable. Defaults to repository name)"
        type: string
        required: false
        default: ""
      cst-branch:
        description: "CST branch to report against (optional, defaults to repository default branch)"
        type: string
        required: false
        default: ""

      # Advanced Configuration
      debug:
        description: "Enable verbose logging and debug output"
        type: boolean
        required: false
        default: false

    secrets:
      magento-cloud-cli-token:
        description: "Magento Cloud CLI token for authentication"
        required: true
      newrelic-api-key:
        description: "NewRelic API key for deployment markers (optional)"
        required: false
      cst-reporting-token:
        description: "CST system reporting token (optional)"
        required: false

    outputs:
      deployment-url:
        description: "URL of the deployed Magento application"
        value: ${{ jobs.deploy.outputs.deployment-url }}
      deployment-id:
        description: "Magento Cloud deployment ID"
        value: ${{ jobs.deploy.outputs.deployment-id }}

jobs:
  deploy:
    name: 🚀 Deploy to Magento Cloud
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      MAGENTO_CLOUD_CLI_TOKEN: ${{ secrets.magento-cloud-cli-token }}
    outputs:
      deployment-url: ${{ steps.deploy-info.outputs.url }}
      deployment-id: ${{ steps.deploy-info.outputs.id }}
    steps:
      - name: Validate required inputs
        run: |
          if [ -z "${INPUTS_MAGENTO_CLOUD_PROJECT_ID}" ]; then
            echo "❌ Error: magento-cloud-project-id is required"
            exit 1
          fi

          if [ "${INPUTS_ENVIRONMENT}" != "integration" ] && \
             [ "${INPUTS_ENVIRONMENT}" != "staging" ] && \
             [ "${INPUTS_ENVIRONMENT}" != "production" ]; then
            echo "❌ Error: environment must be one of: integration, staging, production"
            exit 1
          fi

          echo "✅ All required inputs validated"
        env:
          INPUTS_MAGENTO_CLOUD_PROJECT_ID: ${{ inputs.magento-cloud-project-id }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}

      - name: Create NewRelic deployment marker (start)
        if: inputs.newrelic-app-id != ''
        env:
          NEWRELIC_API_KEY: ${{ secrets.newrelic-api-key }}
          INPUTS_NEWRELIC_APP_ID: ${{ inputs.newrelic-app-id }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ -z "$NEWRELIC_API_KEY" ]; then
            echo "ℹ️ NewRelic API key not configured, skipping deployment marker"
            exit 0
          fi

          echo "📊 Creating NewRelic deployment marker (start)..."

          curl -X POST "https://api.newrelic.com/v2/applications/${INPUTS_NEWRELIC_APP_ID}/deployments.json" \
            -H "X-Api-Key: $NEWRELIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment": {
                "revision": "${{ github.sha }}",
                "changelog": "Magento Cloud deployment started",
                "description": "Deployment to ${INPUTS_ENVIRONMENT} environment",
                "user": "${GITHUB_ACTOR}"
              }
            }'

          echo "✅ NewRelic deployment start marker created"

      - name: Checkout code with full git history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Full git history required for Magento Cloud
          persist-credentials: false

      - name: Install Magento Cloud CLI
        run: |
          echo "📦 Installing Magento Cloud CLI..."
          curl -fsS https://accounts.magento.cloud/cli/installer | php
          export PATH=$HOME/.magento-cloud/bin:$PATH
          echo "$HOME/.magento-cloud/bin" >> $GITHUB_PATH

          # Verify installation
          magento-cloud --version
          echo "✅ Magento Cloud CLI installed successfully"

      - name: Deploy to Magento Cloud
        id: deployment
        run: |
          echo "🚀 Starting deployment to ${INPUTS_ENVIRONMENT}..."

          debug=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            debug="--verbose"
          fi

          # Set project context
          magento-cloud project:set-remote "${INPUTS_MAGENTO_CLOUD_PROJECT_ID}"

          # Deploy based on environment type
          case "${INPUTS_ENVIRONMENT}" in
            "integration")
              # Push to integration environment
              echo "Deploying to integration environment..."
              magento-cloud push --force --wait $debug
              ;;
            "staging"|"production")
              # Push to staging/production branch
              echo "Deploying to ${INPUTS_ENVIRONMENT} environment..."
              magento-cloud push --environment "${INPUTS_ENVIRONMENT}" --force --wait $debug
              ;;
          esac

          echo "✅ Deployment completed successfully"
          echo "deployment-success=true" >> $GITHUB_OUTPUT
        env:
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_MAGENTO_CLOUD_PROJECT_ID: ${{ inputs.magento-cloud-project-id }}

      - name: Get deployment information
        id: deploy-info
        run: |
          echo "📋 Retrieving deployment information..."

          # Get environment URL
          URL=$(magento-cloud url \
            --environment "${INPUTS_ENVIRONMENT}" \
            --project "${INPUTS_MAGENTO_CLOUD_PROJECT_ID}" \
            --pipe | tr -d '[:space:]')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          # Get deployment ID
          DEPLOYMENT_ID=$(magento-cloud activity:list \
            --environment "${INPUTS_ENVIRONMENT}" \
            --type push --limit 1 --format csv \
            --columns id --no-header | head -1)
          echo "id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "🔍 Deployment information:"
            echo "  URL: ${URL}"
            echo "  Deployment ID: ${DEPLOYMENT_ID}"
          fi
        env:
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          INPUTS_MAGENTO_CLOUD_PROJECT_ID: ${{ inputs.magento-cloud-project-id }}

      - name: Generate deployment summary
        run: |
          DEPLOY_URL="${STEPS_DEPLOY_INFO_OUTPUTS_URL}"

          echo "## 🛍️ Magento Cloud Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Project ID** | ${INPUTS_MAGENTO_CLOUD_PROJECT_ID} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${INPUTS_ENVIRONMENT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment ID** | ${STEPS_DEPLOY_INFO_OUTPUTS_ID} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Site URL** | [$DEPLOY_URL]($DEPLOY_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed By** | ${GITHUB_ACTOR} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          case "${INPUTS_ENVIRONMENT}" in
            "production")
              echo "### 🌍 Production Deployment" >> $GITHUB_STEP_SUMMARY
              echo "Your Magento store is now live at:" >> $GITHUB_STEP_SUMMARY
              echo "**[$DEPLOY_URL]($DEPLOY_URL)**" >> $GITHUB_STEP_SUMMARY
              ;;
            "staging")
              echo "### 🚀 Staging Environment" >> $GITHUB_STEP_SUMMARY
              echo "Staging environment updated successfully:" >> $GITHUB_STEP_SUMMARY
              echo "**[$DEPLOY_URL]($DEPLOY_URL)**" >> $GITHUB_STEP_SUMMARY
              ;;
            *)
              echo "### 🔧 Integration Environment" >> $GITHUB_STEP_SUMMARY
              echo "Integration environment deployed for testing:" >> $GITHUB_STEP_SUMMARY
              echo "**[$DEPLOY_URL]($DEPLOY_URL)**" >> $GITHUB_STEP_SUMMARY
              ;;
          esac
        env:
          STEPS_DEPLOY_INFO_OUTPUTS_URL: ${{ steps.deploy-info.outputs.url }}
          INPUTS_MAGENTO_CLOUD_PROJECT_ID: ${{ inputs.magento-cloud-project-id }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          STEPS_DEPLOY_INFO_OUTPUTS_ID: ${{ steps.deploy-info.outputs.id }}

      - name: Create NewRelic deployment marker (complete)
        if: inputs.newrelic-app-id != ''
        env:
          NEWRELIC_API_KEY: ${{ secrets.newrelic-api-key }}
          STEPS_DEPLOYMENT_OUTCOME: ${{ steps.deployment.outcome }}
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          STEPS_DEPLOY_INFO_OUTPUTS_URL: ${{ steps.deploy-info.outputs.url }}
          INPUTS_NEWRELIC_APP_ID: ${{ inputs.newrelic-app-id }}
        run: |
          if [ -z "$NEWRELIC_API_KEY" ]; then
            echo "ℹ️ NewRelic API key not configured, skipping deployment marker"
            exit 0
          fi

          echo "📊 Creating NewRelic deployment marker (complete)..."

          # Determine deployment status based on previous step outcomes
          if [ "${STEPS_DEPLOYMENT_OUTCOME}" == "success" ]; then
            CHANGELOG="Magento Cloud deployment completed successfully"
            DESCRIPTION="Deployment to ${INPUTS_ENVIRONMENT} completed at ${STEPS_DEPLOY_INFO_OUTPUTS_URL}"
            echo "✅ Deployment was successful"
          elif [ "${STEPS_DEPLOYMENT_OUTCOME}" == "failure" ]; then
            CHANGELOG="Magento Cloud deployment failed"
            DESCRIPTION="Deployment to ${INPUTS_ENVIRONMENT} failed - check workflow logs for details"
            echo "❌ Deployment failed"
          elif [ "${STEPS_DEPLOYMENT_OUTCOME}" == "cancelled" ]; then
            CHANGELOG="Magento Cloud deployment cancelled"
            DESCRIPTION="Deployment to ${INPUTS_ENVIRONMENT} was cancelled by user"
            echo "⚠️ Deployment was cancelled"
          else
            CHANGELOG="Magento Cloud deployment status: ${STEPS_DEPLOYMENT_OUTCOME}"
            DESCRIPTION="Deployment to ${INPUTS_ENVIRONMENT} ended with status: ${STEPS_DEPLOYMENT_OUTCOME}"
            echo "ℹ️ Deployment status: ${STEPS_DEPLOYMENT_OUTCOME}"
          fi

          curl -X POST "https://api.newrelic.com/v2/applications/${INPUTS_NEWRELIC_APP_ID}/deployments.json" \
            -H "X-Api-Key: $NEWRELIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment\": {
                \"revision\": \"${{ github.sha }}\",
                \"changelog\": \"${CHANGELOG}\",
                \"description\": \"${DESCRIPTION}\",
                \"user\": \"${GITHUB_ACTOR}\"
              }
            }"

          echo "✅ NewRelic deployment marker created with status: ${STEPS_DEPLOYMENT_OUTCOME}"

      - name: Report deployment to CST
        if: steps.deployment.outcome == 'success'
        run: |
          # Determine CST endpoint - input overrides workspace variable
          CST_ENDPOINT="${INPUTS_CST_ENDPOINT}"
          if [ -z "$CST_ENDPOINT" ]; then
            CST_ENDPOINT="${VARS_CST_ENDPOINT}"
          fi

          # Determine CST project key - input overrides workspace variable, defaults to repo name
          CST_PROJECT_KEY="${INPUTS_CST_PROJECT_KEY}"
          if [ -z "$CST_PROJECT_KEY" ]; then
            CST_PROJECT_KEY="${VARS_CST_PROJECT_KEY}"
          fi
          if [ -z "$CST_PROJECT_KEY" ]; then
            CST_PROJECT_KEY="${GITHUB_EVENT_REPOSITORY_NAME}"
          fi

          # Determine CST reporting key - input overrides workspace secret
          CST_KEY="${{ secrets.cst-reporting-token }}"
          if [ -z "$CST_KEY" ]; then
            CST_KEY="${{ secrets.CST_REPORTING_TOKEN }}"
          fi

          # Check if we have all required CST configuration
          if [ -z "$CST_ENDPOINT" ] || [ -z "$CST_PROJECT_KEY" ] || [ -z "$CST_KEY" ]; then
            echo "ℹ️ CST reporting skipped (missing endpoint, project key, or auth key)"
            echo "  - Endpoint: $([ -n "$CST_ENDPOINT" ] && echo "✅ configured" || echo "❌ missing")"
            echo "  - Project Key: $([ -n "$CST_PROJECT_KEY" ] && echo "✅ configured" || echo "❌ missing")"
            echo "  - Auth Key: $([ -n "$CST_KEY" ] && echo "✅ configured" || echo "❌ missing")"
            exit 0
          fi

          # Determine CST branch - input overrides default branch
          CST_BRANCH="${INPUTS_CST_BRANCH}"
          if [ -z "$CST_BRANCH" ]; then
            CST_BRANCH="${GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH}"
          fi

          # Only report when deploying from the target branch
          CURRENT_BRANCH="${GITHUB_REF_NAME}"
          if [ "$CURRENT_BRANCH" != "$CST_BRANCH" ]; then
            echo "ℹ️ CST reporting skipped (branch '${CURRENT_BRANCH}' does not match target '${CST_BRANCH}')"
            exit 0
          fi

          echo "📡 Reporting deployment to CST (Confidentiality and Security Team)..."

          # Construct full CST URL: endpoint/project_key
          CST_FULL_URL="${CST_ENDPOINT}/${CST_PROJECT_KEY}"

          # Send composer.lock file contents to CST endpoint
          if [ -f "composer.lock" ]; then
            curl -X POST "${CST_FULL_URL}" \
              -H "Authorization: Bearer ${CST_KEY}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @composer.lock

            echo "✅ Deployment reported to CST systems at ${CST_FULL_URL}"
          else
            echo "⚠️ composer.lock not found, skipping CST reporting"
          fi

        env:
          INPUTS_CST_ENDPOINT: ${{ inputs.cst-endpoint }}
          VARS_CST_ENDPOINT: ${{ vars.CST_ENDPOINT }}
          INPUTS_CST_PROJECT_KEY: ${{ inputs.cst-project-key }}
          VARS_CST_PROJECT_KEY: ${{ vars.CST_PROJECT_KEY }}
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          INPUTS_CST_BRANCH: ${{ inputs.cst-branch }}
          GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
