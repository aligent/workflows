name: 🤖 Gadget Deploy
on:
  workflow_call:
    inputs:
      # Core Configuration
      app-name:
        description: "Gadget App name to deploy to (required)"
        type: string
        required: true
      working-directory:
        description: "Working directory for the Gadget app"
        type: string
        required: false
        default: "."
      environment-name:
        description: "Staging/Development environment of Gadget App to push code (required when action is 'push')"
        type: string
        required: false

      # Deployment Control
      action:
        description: "Deployment action to perform: 'push' (push to environment) or 'deploy' (deploy to production)"
        type: string
        required: true
      test:
        description: "Boolean to check if run tests"
        type: boolean
        default: false

      # Backport Configuration
      create-backport-pr:
        description: "Create a backport PR to staging after deployment"
        type: boolean
        default: false
      backport-target-branch:
        description: "Target branch for backport PR"
        type: string
        default: "staging"

    secrets:
      gadget-api-token:
        description: "Gadget API token"
        required: true
      gadget-test-api-key:
        description: "Gadget Test API key for running tests"
        required: false

jobs:
  push:
    name: 🫸 Push to Gadget
    runs-on: ubuntu-latest
    if: inputs.action == 'push'
    env:
      GGT_TOKEN: ${{ secrets.gadget-api-token }}
    outputs:
      push-environment-status: ${{ steps.push-environment.outcome }}
    steps:
      - name: Validate environment-name
        run: |
          if [ -z "${INPUTS_ENVIRONMENT_NAME}" ]; then
            echo "::error::environment-name is required when action is 'push'"
            exit 1
          fi
        env:
          INPUTS_ENVIRONMENT_NAME: ${{ inputs.environment-name }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install ggt
        run: |
          npm install -g ggt
          ggt version

      - name: Push code to environment in Gadget
        id: push-environment
        working-directory: ${{ inputs.working-directory }}
        run: |
          ggt push \
            --app=${INPUTS_APP_NAME} \
            --env=${INPUTS_ENVIRONMENT_NAME} \
            --force --allow-unknown-directory
        env:
          INPUTS_APP_NAME: ${{ inputs.app-name }}
          INPUTS_ENVIRONMENT_NAME: ${{ inputs.environment-name }} 

  test:
    name: 🧪 Test from Gadget
    runs-on: ubuntu-latest
    if: inputs.test == true && inputs.action == 'push'
    needs: push
    env:
      GGT_TOKEN: ${{ secrets.gadget-api-token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install ggt
        run: |
          npm install -g ggt
          ggt version

      - name: Pull client files into env # pull .gadget folder into test runner
        working-directory: ${{ inputs.working-directory }}
        run: |
          ggt pull \
            --app=${INPUTS_APP_NAME} \
            --env=${INPUTS_ENVIRONMENT_NAME} \
            --force --allow-unknown-directory
        env:
          INPUTS_APP_NAME: ${{ inputs.app-name }}
          INPUTS_ENVIRONMENT_NAME: ${{ inputs.environment-name }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: ${{ inputs.working-directory }}/.nvmrc
          cache: yarn
          cache-dependency-path: ${{ inputs.working-directory }}/yarn.lock

      - name: Install safe-chain
        run: |
          SAFE_CHAIN_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
          curl -fsSL "$SAFE_CHAIN_URL" | sh -s -- --ci

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: yarn --frozen-lockfile

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        env:
          GADGET_TEST_API_KEY: ${{ secrets.gadget-test-api-key }}
          GADGET_ENV: ${{ inputs.environment-name }}
        run: yarn test

  deploy:
    name: 🚀 Deploying Gadget
    runs-on: ubuntu-latest
    if: inputs.action == 'deploy'
    env:
      GGT_TOKEN: ${{ secrets.gadget-api-token }}
      INPUTS_APP_NAME: ${{ inputs.app-name }}
      TEMP_ENV_NAME: deploy-${{ github.run_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Install ggt
        run: |
          npm install -g ggt
          ggt version

      - name: Create temp Gadget environment
        run: |
          ggt env create ${TEMP_ENV_NAME} \
            --app ${INPUTS_APP_NAME}

      - name: Push code to temp Gadget environment
        working-directory: ${{ inputs.working-directory }}
        run: |
          ggt push \
            --app=${INPUTS_APP_NAME} \
            --env=${TEMP_ENV_NAME} \
            --force --allow-unknown-directory

      - name: Deploy (promote) to Production environment in Gadget
        working-directory: ${{ inputs.working-directory }}
        run: |
          ggt deploy \
            --app=${INPUTS_APP_NAME} \
            --env=${TEMP_ENV_NAME} \
            --force --allow-unknown-directory --allow-problems

      - name: Remove temp Gadget environment
        if: always()
        run: |
          ggt env delete ${TEMP_ENV_NAME} \
            --app ${INPUTS_APP_NAME} \
            --force

      - name: Backport to staging
        if: success() && inputs.create-backport-pr
        uses: aligent/workflows/.github/actions/backport@main
        with:
          target-branch: ${{ inputs.backport-target-branch }}
