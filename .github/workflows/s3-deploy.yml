name: S3 Deployment

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        type: string
        required: false
        default: "ap-southeast-2"
      s3-bucket:
        description: "Name of the S3 bucket"
        type: string
        required: true
      s3-path:
        description: "Path in the S3 bucket"
        type: string
        required: false
        default: ""
      local-path:
        description: "Path to deploy"
        type: string
        required: true
      delete-flag:
        description: "Enable --delete flag"
        type: boolean
        required: false
        default: false
      cache-control:
        description: "Cache control headers"
        type: string
        required: false
      extra-args:
        description: "Additional AWS CLI args"
        type: string
        required: false
        default: ""
      aws-access-key-id:
        description: "AWS Access Key ID"
        type: string
        required: true

      # Backport Configuration
      create-backport-pr:
        description: "Create a backport PR to staging after deployment"
        type: boolean
        required: false
        default: false
      backport-target-branch:
        description: "Target branch for backport PR"
        type: string
        required: false
        default: "staging"

    secrets:
      aws-secret-access-key:
        description: "AWS Secret Access Key"
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 #v6.1.0
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy to S3
        run: |
          s3_path=""
          cache_control=""
          extra_args=""

          if [ -n "${INPUTS_CACHE_CONTROL}" ]; then
              cache_control="--cache-control \"${INPUTS_CACHE_CONTROL}\""
          fi

          command="aws s3 sync ${INPUTS_LOCAL_PATH}"
          command="$command s3://${INPUTS_S3_BUCKET}${INPUTS_S3_PATH} ${cache_control} ${INPUTS_EXTRA_ARGS}"

          if [ "${INPUTS_DELETE_FLAG}" = "true" ]; then
            command="$command --delete"
          fi

          $command
        env:
          INPUTS_CACHE_CONTROL: ${{inputs.cache-control}}
          INPUTS_LOCAL_PATH: ${{inputs.local-path}}
          INPUTS_S3_BUCKET: ${{inputs.s3-bucket}}
          INPUTS_S3_PATH: ${{inputs.s3-path}}
          INPUTS_EXTRA_ARGS: ${{inputs.extra-args}}
          INPUTS_DELETE_FLAG: ${{ inputs.delete-flag }}

      - name: Backport to staging
        if: success() && inputs.create-backport-pr
        uses: aligent/workflows/.github/actions/backport@main
        with:
          target-branch: ${{ inputs.backport-target-branch }}
