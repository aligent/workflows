name: 🎨 Shopify Theme PR Checks

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for the theme'
        required: false
        type: string
        default: '.'
      fail-level:
        description: 'Theme Check fail level (error, suggestion, style)'
        required: false
        type: string
        default: 'error'
      shopify-store:
        description: 'Shopify store URL (e.g. example.myshopify.com). Required for preview deploy.'
        required: false
        type: string
      deploy-preview:
        description: 'Deploy an unpublished preview theme per PR'
        required: false
        type: boolean
        default: false
      pr-number:
        description: 'The pull request number from the caller. Pass github.event.pull_request.number.'
        required: true
        type: string
    secrets:
      SHOPIFY_CLI_THEME_TOKEN:
        description: 'Theme Access app password for preview deploys'
        required: false

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-shopify-cli

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Register problem matcher
        uses: aligent/workflows/.github/actions/shopify-theme-problem-matchers@main

      - name: Run Theme Check
        working-directory: ${{ inputs.working-directory }}
        env:
          INPUTS_FAIL_LEVEL: ${{ inputs.fail-level }}
        run: |
          shopify theme check --output json > theme-check-report.json 2>/dev/null || true

          # Transform JSON report into a format the problem matcher can parse
          # Theme Check offenses use 0-indexed rows/columns; annotations need 1-indexed
          jq -r '
            .[] | .path as $path |
            .offenses[] |
            "\($path):\(.start_row + 1):\(.start_column + 1): \(.severity) [\(.check)] \(.message)"
          ' theme-check-report.json

          error_count=$(jq '[.[].errorCount] | add // 0' theme-check-report.json)
          warning_count=$(jq '[.[].warningCount] | add // 0' theme-check-report.json)
          echo "Theme Check: ${error_count} error(s), ${warning_count} warning(s)"

          fail_level="${INPUTS_FAIL_LEVEL}"
          if [ "$fail_level" = "error" ] && [ "$error_count" -gt 0 ]; then
            exit 1
          elif [ "$fail_level" = "warning" ] && [ $((error_count + warning_count)) -gt 0 ]; then
            exit 1
          elif [ "$fail_level" = "suggestion" ] || [ "$fail_level" = "style" ]; then
            total=$(jq '[.[].offenses | length] | add // 0' theme-check-report.json)
            if [ "$total" -gt 0 ]; then
              exit 1
            fi
          fi

      - name: Remove problem matcher
        if: always()
        uses: aligent/workflows/.github/actions/shopify-theme-problem-matchers@main
        with:
          action: remove

  preview:
    name: Preview Theme
    needs: theme-check
    if: inputs.deploy-preview
    runs-on: ubuntu-latest
    env:
      # zizmor: ignore[secrets-outside-env] caller controls environment scoping
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ inputs.shopify-store }}
      PR_THEME_NAME: "PR-#${{ inputs.pr-number }}"
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${SHOPIFY_FLAG_STORE}" ]; then
            echo "::error::shopify-store input is required when deploy-preview is enabled"
            exit 1
          fi
          if [ -z "${SHOPIFY_CLI_THEME_TOKEN}" ]; then
            echo "::error::SHOPIFY_CLI_THEME_TOKEN secret is required when deploy-preview is enabled"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-shopify-cli

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push theme
        working-directory: ${{ inputs.working-directory }}
        run: |
          # Check if a theme with this name already exists
          EXISTING_ID=$(shopify theme list --json \
            | jq -r --arg name "$PR_THEME_NAME" '.[] | select(.name == $name) | .id // empty')

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing preview theme (ID: $EXISTING_ID)"
            shopify theme push \
              --json \
              --theme "$EXISTING_ID" \
              > push.json
          else
            echo "Creating new preview theme"
            shopify theme push \
              --unpublished \
              --json \
              --theme "$PR_THEME_NAME" \
              > push.json
          fi

      - name: Extract preview URL
        id: preview
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          url=$(jq -r '.theme.preview_url // empty' "$WORKING_DIRECTORY/push.json")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview link on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          MARKER="<!-- shopify-preview -->"
          BODY="${MARKER}
          **Preview theme:** ${PR_THEME_NAME}

          **Preview URL:** ${PREVIEW_URL}"

          # Find an existing comment with the marker
          COMMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -n1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              --field body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
