name: 📱 PWA Deployment

on:
  workflow_call:
    inputs:
      # AWS Configuration
      aws-region:
        description: "AWS region for deployment"
        type: string
        required: false
        default: "ap-southeast-2"
      s3-bucket:
        description: "S3 bucket name for deployment"
        type: string
        required: false
      cloudfront-distribution-id:
        description: "CloudFront distribution ID for cache invalidation"
        type: string
        required: false
      role-session-name:
        description: "AWS role session name for OIDC authentication (default: {repo}-{short-sha}-{run-number})"
        type: string
        required: false
        default: ""

      # Environment Configuration
      environment:
        description: "GitHub Environment name for secrets/variables (e.g. Staging, Production)"
        type: string
        required: true

      # Build Configuration
      package-manager:
        description: "Node package manager (yarn/npm)"
        type: string
        required: false
        default: "yarn"
      is-yarn-classic:
        description: "Use Yarn Classic (pre-Berry) instead of modern Yarn"
        type: boolean
        required: false
        default: false
      build-command:
        description: "Build command to execute"
        type: string
        required: false
        default: "build"
      build-directory:
        description: "Directory containing built assets to deploy"
        type: string
        required: false
        default: "dist"

      # Cache Strategy Configuration
      cache-strategy:
        description: "Cache strategy for assets (immutable/no-cache)"
        type: string
        required: false
        default: "immutable"

      # Preview Environment Configuration
      preview-mode:
        description: "Enable preview mode for PR-based deployments"
        type: boolean
        required: false
        default: false
      preview-base-url:
        description: "Base URL for preview deployments"
        type: string
        required: false
        default: ""

      # Multi-brand Configuration
      brand-config:
        description: "JSON configuration for multi-brand deployments"
        type: string
        required: false
        default: ""

      # Advanced Configuration
      cloudfront-invalidation-paths:
        description: "CloudFront invalidation paths (JSON array)"
        type: string
        required: false
        default: '["/*"]'
      extra-sync-args:
        description: "Additional AWS S3 sync arguments"
        type: string
        required: false
        default: ""

      # Debug and Control
      debug:
        description: "Enable verbose logging and debug output"
        type: boolean
        required: false
        default: false

    outputs:
      deployment-url:
        description: "URL of the deployed application"
        value: ${{ jobs.build-and-deploy.outputs.deployment-url }}
      preview-url:
        description: "Preview URL for PR deployments"
        value: ${{ jobs.build-and-deploy.outputs.preview-url }}

jobs:
  # Validate inputs and prepare deployment configuration
  prepare:
    name: 🔍 Prepare Deployment
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      cache-control-static: ${{ steps.cache-config.outputs.cache-control-static }}
      cache-control-html: ${{ steps.cache-config.outputs.cache-control-html }}
      s3-prefix: ${{ steps.deployment-config.outputs.s3-prefix }}
      deployment-url: ${{ steps.deployment-config.outputs.deployment-url }}
      brand-matrix: ${{ steps.brand-config.outputs.matrix }}
      invalidation-paths: ${{ steps.cache-config.outputs.invalidation-paths }}
      auth-mode: ${{ steps.validate-inputs.outputs.auth-mode }}
      role-session-name: ${{ steps.resolve-session-name.outputs.role-session-name }}
    steps:
      - name: Validate required inputs
        id: validate-inputs
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || inputs.cloudfront-distribution-id }}
          VAR_AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          SECRET_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          VAR_AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          echo "🔍 Validating deployment configuration..."
          echo "ℹ️ Using variables from $ENVIRONMENT environment"

          if [ -z "$S3_BUCKET" ]; then
            echo "❌ Error: S3_BUCKET must be set as a variable in your $ENVIRONMENT environment"
            exit 1
          fi
          echo "✅ S3_BUCKET: $S3_BUCKET"

          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "❌ Error: CLOUDFRONT_DISTRIBUTION_ID must be set as a variable in your $ENVIRONMENT environment"
            exit 1
          fi
          echo "✅ CLOUDFRONT_DISTRIBUTION_ID: $CLOUDFRONT_DISTRIBUTION_ID"

          if [ -n "$VAR_AWS_ACCESS_KEY_ID" ]; then
            echo "ℹ️ AWS_ACCESS_KEY_ID set from variable: $VAR_AWS_ACCESS_KEY_ID"
            if [ -z "$SECRET_AWS_SECRET_ACCESS_KEY" ]; then
              echo "❌ Error: AWS_SECRET_ACCESS_KEY is not defined as a secret in your $ENVIRONMENT environment"
              exit 1
            fi
            echo "✅ AWS_SECRET_ACCESS_KEY secret is configured"
            echo "✅ Using static credential authentication"
            echo "auth-mode=static" >> $GITHUB_OUTPUT
          elif [ -n "$VAR_AWS_ROLE_ARN" ]; then
            echo "ℹ️ AWS_ROLE_ARN set from variable: $VAR_AWS_ROLE_ARN"
            echo "✅ Using OIDC authentication"
            echo "auth-mode=oidc" >> $GITHUB_OUTPUT
          else
            echo "❌ Error: No AWS credentials configured in your $ENVIRONMENT environment."
            echo "  Configure one of the following:"
            echo "  - Static credentials: AWS_ACCESS_KEY_ID (variable) + AWS_SECRET_ACCESS_KEY (secret)"
            echo "  - OIDC: AWS_ROLE_ARN (variable)"
            exit 1
          fi

          echo "✅ All inputs validated successfully"

      - name: Resolve role session name
        id: resolve-session-name
        if: steps.validate-inputs.outputs.auth-mode == 'oidc'
        env:
          ROLE_SESSION_NAME: ${{ inputs.role-session-name }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          SESSION_NAME="$ROLE_SESSION_NAME"
          if [ -z "$SESSION_NAME" ]; then
            SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
            SESSION_NAME="${REPOSITORY_NAME}-${SHORT_SHA}-${RUN_NUMBER}"
          fi
          # AWS session names: max 64 chars, allowed [a-zA-Z0-9=,.@-]
          SESSION_NAME=$(echo "$SESSION_NAME" | tr -c '[:alnum:]=,.@-' '-' | cut -c1-64)
          echo "role-session-name=$SESSION_NAME" >> $GITHUB_OUTPUT

      - name: Configure cache strategy
        id: cache-config
        run: |
          case "${INPUTS_CACHE_STRATEGY}" in
            "immutable")
              # Static assets with content hashing - cache for 1 year
              echo "cache-control-static=public, max-age=31536000, immutable" >> $GITHUB_OUTPUT
              # HTML files - cache for 1 hour with revalidation
              echo "cache-control-html=public, max-age=3600, must-revalidate" >> $GITHUB_OUTPUT
              ;;
            "no-cache")
              # Force revalidation for all assets
              echo "cache-control-static=no-cache, no-store, must-revalidate" >> $GITHUB_OUTPUT
              echo "cache-control-html=no-cache, no-store, must-revalidate" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Invalid cache-strategy: '${INPUTS_CACHE_STRATEGY}'. Must be 'immutable' or 'no-cache'."
              exit 1
              ;;
          esac

          # Prepare invalidation paths (use heredoc to preserve JSON special characters)
          {
            echo 'invalidation-paths<<INVALIDATION_EOF'
            echo '${INPUTS_CLOUDFRONT_INVALIDATION_PATHS}'
            echo 'INVALIDATION_EOF'
          } >> $GITHUB_OUTPUT

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "🔍 Cache configuration:"
            echo "  Strategy: ${INPUTS_CACHE_STRATEGY}"
            echo "  Static assets: $(cat $GITHUB_OUTPUT | grep cache-control-static | cut -d'=' -f2-)"
            echo "  HTML files: $(cat $GITHUB_OUTPUT | grep cache-control-html | cut -d'=' -f2-)"
          fi
        env:
          INPUTS_CACHE_STRATEGY: ${{ inputs.cache-strategy }}
          INPUTS_CLOUDFRONT_INVALIDATION_PATHS: ${{ inputs.cloudfront-invalidation-paths }}

      - name: Configure deployment paths
        id: deployment-config
        run: |
          if [ "${{ inputs.preview-mode }}" = "true" ]; then
            # Preview deployment uses PR number or branch name
            if [ -n "${{ github.event.pull_request.number }}" ]; then
              PREFIX="pr-${{ github.event.pull_request.number }}"
            else
              PREFIX="branch-$(echo '${GITHUB_REF_NAME}' | sed 's/[^a-zA-Z0-9-]/-/g')"
            fi

            echo "s3-prefix=${PREFIX}/" >> $GITHUB_OUTPUT

            if [ -n "${INPUTS_PREVIEW_BASE_URL}" ]; then
              echo "deployment-url=${INPUTS_PREVIEW_BASE_URL}/${PREFIX}/" >> $GITHUB_OUTPUT
            else
              DEPLOY_URL="https://${INPUTS_S3_BUCKET}.s3.amazonaws.com/${PREFIX}/index.html"
              echo "deployment-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            fi
          else
            # Production/staging deployment to root
            echo "s3-prefix=" >> $GITHUB_OUTPUT

            if [ -n "${INPUTS_PREVIEW_BASE_URL}" ]; then
              echo "deployment-url=${INPUTS_PREVIEW_BASE_URL}/" >> $GITHUB_OUTPUT
            else
              echo "deployment-url=https://${INPUTS_S3_BUCKET}.s3.amazonaws.com/index.html" >> $GITHUB_OUTPUT
            fi
          fi

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "🔍 Deployment configuration:"
            echo "  S3 Prefix: $(cat $GITHUB_OUTPUT | grep s3-prefix | cut -d'=' -f2-)"
            echo "  Deployment URL: $(cat $GITHUB_OUTPUT | grep deployment-url | cut -d'=' -f2-)"
          fi
        env:
          INPUTS_PREVIEW_BASE_URL: ${{ inputs.preview-base-url }}
          INPUTS_S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}

      - name: Configure multi-brand matrix
        id: brand-config
        run: |
          if [ -n "${INPUTS_BRAND_CONFIG}" ]; then
            echo "matrix=${INPUTS_BRAND_CONFIG}" >> $GITHUB_OUTPUT
            echo "📱 Multi-brand deployment configured"
          else
            echo 'matrix={"brand":["default"]}' >> $GITHUB_OUTPUT
            echo "📱 Single brand deployment"
          fi

        env:
          INPUTS_BRAND_CONFIG: ${{ inputs.brand-config }}

  # Build and deploy the application
  build-and-deploy:
    name: 🚀 Build Application and Deploy to AWS
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ inputs.environment }}
      url: ${{ needs.prepare.outputs.deployment-url }}
    outputs:
      deployment-url: ${{ needs.prepare.outputs.deployment-url }}
      preview-url: ${{ needs.prepare.outputs.deployment-url }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.brand-matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          debug=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            debug="--verbose"
          fi

          case "${INPUTS_PACKAGE_MANAGER}" in
            "yarn")
              if [ "${{ inputs.is-yarn-classic }}" = "true" ]; then
                yarn install --frozen-lockfile $debug
              else
                yarn install --immutable $debug
              fi
              ;;
            "npm")
              npm ci $debug
              ;;
            *)
              echo "❌ Unsupported package manager: ${INPUTS_PACKAGE_MANAGER}"
              exit 1
              ;;
          esac
        env:
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}

      - name: Build application
        run: |
          debug=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            debug="--verbose"
          fi

          # Set brand-specific environment if multi-brand
          if [ "${MATRIX_BRAND}" != "default" ]; then
            echo "🏷️ Building for brand: ${MATRIX_BRAND}"
            export BRAND=${MATRIX_BRAND}
          fi

          echo "🏗️ Building application..."
          ${INPUTS_PACKAGE_MANAGER} run ${INPUTS_BUILD_COMMAND} $debug
        env:
          MATRIX_BRAND: ${{ matrix.brand }}
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
          INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}

      - name: Verify build output
        run: |
          if [ ! -d "${INPUTS_BUILD_DIRECTORY}" ]; then
            echo "❌ Build directory '${INPUTS_BUILD_DIRECTORY}' not found"
            echo "Available directories:"
            ls -la
            exit 1
          fi

          echo "✅ Build completed successfully"
          echo "📁 Build directory contents:"
          find "${INPUTS_BUILD_DIRECTORY}" -type f | head -10        
        env:
          INPUTS_BUILD_DIRECTORY: ${{ inputs.build-directory }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6.0.0
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || inputs.aws-region }}

      - name: Configure AWS credentials (OIDC)
        if: needs.prepare.outputs.auth-mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: ${{ needs.prepare.outputs.role-session-name }}
          aws-region: ${{ vars.AWS_REGION || inputs.aws-region }}

      - name: Configure S3 deployment paths
        id: s3-config
        run: |
          S3_PATH="${NEEDS_PREPARE_OUTPUTS_S3_PREFIX}"

          if [ "${MATRIX_BRAND}" != "default" ]; then
            S3_PATH="${S3_PATH}${MATRIX_BRAND}/"
          fi

          echo "s3-path=${S3_PATH}" >> $GITHUB_OUTPUT
          echo "🎯 Deploying to: s3://${INPUTS_S3_BUCKET}/${S3_PATH}"
        env:
          NEEDS_PREPARE_OUTPUTS_S3_PREFIX: ${{ needs.prepare.outputs.s3-prefix }}
          MATRIX_BRAND: ${{ matrix.brand }}
          INPUTS_S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}

      - name: Deploy static assets to S3
        run: |
          echo "🚀 Deploying static assets..."

          # Deploy static assets with immutable cache headers (exclude HTML and service-worker.js)
          aws s3 sync \
            "${INPUTS_BUILD_DIRECTORY}" \
            "s3://${INPUTS_S3_BUCKET}/${STEPS_S3_CONFIG_OUTPUTS_S3_PATH}" \
            --exclude "*.html" \
            --exclude "service-worker.js" \
            --cache-control "${NEEDS_PREPARE_OUTPUTS_CACHE_CONTROL_STATIC}" \
            --delete \
            ${INPUTS_EXTRA_SYNC_ARGS}
        env:
          INPUTS_BUILD_DIRECTORY: ${{ inputs.build-directory }}
          INPUTS_S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}
          STEPS_S3_CONFIG_OUTPUTS_S3_PATH: ${{ steps.s3-config.outputs.s3-path }}
          NEEDS_PREPARE_OUTPUTS_CACHE_CONTROL_STATIC: ${{ needs.prepare.outputs.cache-control-static }}
          INPUTS_EXTRA_SYNC_ARGS: ${{ inputs.extra-sync-args }}

      - name: Deploy HTML and service worker to S3
        run: |
          echo "📄 Deploying HTML files and service worker..."

          # Deploy HTML and service-worker.js with revalidation cache headers
          aws s3 sync \
            "${INPUTS_BUILD_DIRECTORY}" \
            "s3://${INPUTS_S3_BUCKET}/${STEPS_S3_CONFIG_OUTPUTS_S3_PATH}" \
            --exclude "*" \
            --include "*.html" \
            --include "service-worker.js" \
            --cache-control "${NEEDS_PREPARE_OUTPUTS_CACHE_CONTROL_HTML}" \
            ${INPUTS_EXTRA_SYNC_ARGS}
        env:
          INPUTS_BUILD_DIRECTORY: ${{ inputs.build-directory }}
          INPUTS_S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}
          STEPS_S3_CONFIG_OUTPUTS_S3_PATH: ${{ steps.s3-config.outputs.s3-path }}
          NEEDS_PREPARE_OUTPUTS_CACHE_CONTROL_HTML: ${{ needs.prepare.outputs.cache-control-html }}
          INPUTS_EXTRA_SYNC_ARGS: ${{ inputs.extra-sync-args }}

      - name: Invalidate CloudFront cache
        run: |
          echo "🔄 Invalidating CloudFront cache..."

          # Parse invalidation paths
          PATHS=$(echo '${NEEDS_PREPARE_OUTPUTS_INVALIDATION_PATHS}' | jq -r '.[]')

          # Add brand prefix if multi-brand deployment
          if [ "${MATRIX_BRAND}" != "default" ]; then
            PREFIXED_PATHS=""
            for path in $PATHS; do
              if [ "$path" = "/*" ]; then
                PREFIXED_PATHS="$PREFIXED_PATHS /${STEPS_S3_CONFIG_OUTPUTS_S3_PATH}*"
              else
                PREFIXED_PATHS="$PREFIXED_PATHS /${STEPS_S3_CONFIG_OUTPUTS_S3_PATH}${path#/}"
              fi
            done
            PATHS="$PREFIXED_PATHS"
          fi

          echo "Invalidating paths: $PATHS"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths $PATHS \
            --query 'Invalidation.Id' \
            --output text)

          echo "✅ CloudFront invalidation created: $INVALIDATION_ID"

          if [ "${{ inputs.debug }}" = "true" ]; then
            echo "🔍 Waiting for invalidation to complete..."
            aws cloudfront wait invalidation-completed \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --id "$INVALIDATION_ID"
            echo "✅ CloudFront invalidation completed"
          fi
        env:
          NEEDS_PREPARE_OUTPUTS_INVALIDATION_PATHS: ${{ needs.prepare.outputs.invalidation-paths }}
          MATRIX_BRAND: ${{ matrix.brand }}
          STEPS_S3_CONFIG_OUTPUTS_S3_PATH: ${{ steps.s3-config.outputs.s3-path }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} || ${{ inputs.cloudfront-distribution-id }}
      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${INPUTS_ENVIRONMENT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Brand** | ${MATRIX_BRAND} |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Bucket** | ${INPUTS_S3_BUCKET} |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Path** | ${STEPS_S3_CONFIG_OUTPUTS_S3_PATH} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cache Strategy** | ${INPUTS_CACHE_STRATEGY} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment URL** | ${NEEDS_PREPARE_OUTPUTS_DEPLOYMENT_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Manager**: ${INPUTS_PACKAGE_MANAGER}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Command**: ${INPUTS_BUILD_COMMAND}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Directory**: ${INPUTS_BUILD_DIRECTORY}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DEPLOY_URL="${NEEDS_PREPARE_OUTPUTS_DEPLOYMENT_URL}"
          if [ "${{ inputs.preview-mode }}" = "true" ]; then
            echo "### 🔍 Preview Environment" >> $GITHUB_STEP_SUMMARY
            echo "This is a preview deployment. The application is available at:" >> $GITHUB_STEP_SUMMARY
            echo "**[$DEPLOY_URL]($DEPLOY_URL)**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🌍 Deployment" >> $GITHUB_STEP_SUMMARY
            echo "Application deployed to ${INPUTS_ENVIRONMENT} environment:" >> $GITHUB_STEP_SUMMARY
            echo "**[$DEPLOY_URL]($DEPLOY_URL)**" >> $GITHUB_STEP_SUMMARY
          fi

        env:
          INPUTS_ENVIRONMENT: ${{ inputs.environment }}
          MATRIX_BRAND: ${{ matrix.brand }}
          INPUTS_S3_BUCKET: ${{ vars.S3_BUCKET || inputs.s3-bucket }}
          STEPS_S3_CONFIG_OUTPUTS_S3_PATH: ${{ steps.s3-config.outputs.s3-path }}
          INPUTS_CACHE_STRATEGY: ${{ inputs.cache-strategy }}
          NEEDS_PREPARE_OUTPUTS_DEPLOYMENT_URL: ${{ needs.prepare.outputs.deployment-url }}
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
          INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}
          INPUTS_BUILD_DIRECTORY: ${{ inputs.build-directory }}
