name: 🚀 Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "The GitHub environment to run the workflow in"
        type: string
        required: true
      command:
        description: "Command to run"
        type: string
        required: false
        default: "deploy"
      package-manager:
        description: "Node package manager to use"
        type: string
        required: false
        default: "yarn"
      is-yarn-classic:
        description: "If Yarn (pre-Berry) should be used"
        default: false
        type: boolean
      debug:
        description: "Debug mode - enable verbose logging"
        type: boolean
        required: false
        default: false
    secrets:
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Validate required inputs
        run: |
          echo "🔍 Validating deployment configuration..."

          if [ -z "$ENVIRONMENT" ]; then
            ENVIRONMENT="Repository"
          fi

          echo "ℹ️ Using variables from $ENVIRONMENT environment"

          echo "✅ AWS_REGION: $AWS_REGION"

          if [ -z "$STAGE" ]; then
            echo "❌ Error: STAGE must be provided via input or as a variable in your $ENVIRONMENT environment"
            exit 1
          fi

          echo "✅ STAGE: $STAGE"

          if [ -z "$CFN_ROLE" ]; then
            echo "❌ Error: CFN_ROLE must be provided via input or as a variable in your $ENVIRONMENT environment"
            exit 1
          fi

          echo "✅ CFN_ROLE: $CFN_ROLE"

          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "❌ Error: AWS_ACCESS_KEY_ID is not defined as a variable in your $ENVIRONMENT environment"
            exit 1
          fi

          echo "✅ AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID"

          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "❌ Error: AWS_SECRET_ACCESS_KEY is not defined as a secret in your $ENVIRONMENT environment"
            echo "or passed in via an external secret from the calling workflow"
            exit 1
          fi

          echo "✅ AWS_SECRET_ACCESS_KEY secret is configured"
          echo "✅ All inputs validated successfully"
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          STAGE: ${{ vars.STAGE }}
          CFN_ROLE: ${{ vars.CFN_ROLE }}
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - name: Enable Corepack
        if: ${{ inputs.package-manager == 'yarn' && !inputs.is-yarn-classic }}
        run: corepack enable

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: .nvmrc
          cache: ${{ inputs.package-manager }}

      - name: Install safe-chain
        run: |
          SAFE_CHAIN_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
          curl -fsSL "$SAFE_CHAIN_URL" | sh -s -- --ci

      - name: Install dependencies
        run: |
          debug=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            debug="--verbose"
          fi

          lock_dependencies="--immutable"
          if [ "${{ inputs.is-yarn-classic }}" = "true" ]; then
            lock_dependencies="--frozen-lockfile"
          elif [ "${INPUTS_PACKAGE_MANAGER}" = "yarn" ]; then
            debug=""
          fi

          if [ "${INPUTS_PACKAGE_MANAGER}" = "yarn" ]; then
            yarn config get nodeLinker
            yarn install $lock_dependencies $debug
          else
            npm ci $debug
          fi
        env:
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}

      - name: 🔍 Check repository type
        id: repo-type
        run: |
          echo "Checking repository type..."
          if [ -f "nx.json" ]; then
            echo "is_monorepo=true" >> $GITHUB_OUTPUT
            echo "Repository is a monorepo (nx.json found)"
          else
            echo "is_monorepo=false" >> $GITHUB_OUTPUT
            echo "Repository is not a monorepo (nx.json not found)"
          fi

      - name: 🚧 Configure Serverless
        run: |
          verbose=""
          if [ "$DEBUG" = "true" ]; then
            verbose="--verbose"
          fi

          npx serverless config credentials \
            --provider aws \
            --key "$AWS_ACCESS_KEY_ID" \
            --secret "$AWS_SECRET_ACCESS_KEY" \
            $verbose

          curl -L https://github.com/mikefarah/yq/releases/download/v4.45.4/yq_linux_amd64 > /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

          # Insert the cfnRole value into all serverless files
          # yq v4 converts YAML merge keys (<<) to !!merge tags when writing,
          # which is invalid for serverless. Pipe through sed to strip them.
          if [ "${STEPS_REPO_TYPE_OUTPUTS_IS_MONOREPO}" = "true" ]; then
            find services/*/ -name serverless.yml -exec sh -c '
              yq ".provider.cfnRole = \"${0}\"" "$1" | sed "s/!!merge <</<</g" > "$1.tmp" && mv "$1.tmp" "$1"
            ' "$CFN_ROLE" {} \;
          else
            yq ".provider.cfnRole = \"$CFN_ROLE\"" serverless.yml \
              | sed "s/!!merge <</<</g" > serverless.yml.tmp \
              && mv serverless.yml.tmp serverless.yml
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
          CFN_ROLE: ${{ vars.CFN_ROLE }}
          DEBUG: ${{ inputs.debug }}
          STEPS_REPO_TYPE_OUTPUTS_IS_MONOREPO: ${{ steps.repo-type.outputs.is_monorepo }}

      - name: 🚀 Deploy
        run: |
          echo "Deploying to ${STAGE}"

          verbose=""
          if [ "$DEBUG" = "true" ]; then
            verbose="--verbose"
          fi

          if [ "${STEPS_REPO_TYPE_OUTPUTS_IS_MONOREPO}" = "true" ]; then
            echo "Deploying monorepo..."
            npx nx run-many -t "$COMMAND" $verbose -- --stage "$STAGE"
          else
            npx serverless "$COMMAND" --stage "$STAGE" $verbose
          fi
        env:
          COMMAND: ${{ inputs.command }}
          STAGE: ${{ vars.STAGE }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
          DEBUG: ${{ inputs.debug }}

          STEPS_REPO_TYPE_OUTPUTS_IS_MONOREPO: ${{ steps.repo-type.outputs.is_monorepo }}
