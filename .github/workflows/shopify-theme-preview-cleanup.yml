name: 🧹 Shopify Theme Preview Cleanup

on:
  workflow_call:
    inputs:
      shopify-store:
        description: 'Shopify store URL (e.g. example.myshopify.com)'
        required: true
        type: string
      pr-number:
        description: 'The pull request number from the caller. Pass github.event.pull_request.number.'
        required: true
        type: string
    secrets:
      SHOPIFY_CLI_THEME_TOKEN:
        description: 'Theme Access app password'
        required: true

jobs:
  cleanup:
    name: Cleanup preview
    runs-on: ubuntu-latest
    env:
      # zizmor: ignore[secrets-outside-env] caller controls environment scoping
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ inputs.shopify-store }}
      PR_THEME_NAME: "PR-#${{ inputs.pr-number }}"
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'

      - name: Cache npm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-shopify-cli

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Delete preview theme (ignore if missing)
        run: shopify theme delete --theme "$PR_THEME_NAME" --force || true
