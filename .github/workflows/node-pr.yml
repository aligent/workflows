name: 🕵️ Node Pull Request Checks

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        description: "NPM authentication token for private registries"
        required: false
      ENV_VARS:
        description: "Additional environment variables as key=value pairs (supports multiline values like SSH keys)"
        required: false
    inputs:
      package-manager:
        description: "Node package manager to use"
        default: yarn
        type: string
      has-env-vars:
        description: "Whether environment variables are provided"
        default: false
        type: boolean
      is-yarn-classic:
        description: "If Yarn (pre-Berry) should be used"
        default: false
        type: boolean
      build-command:
        description: "Command to override the build command"
        default: build
        type: string
      test-command:
        description: "Command to override the test command"
        default: test
        type: string
      lint-command:
        description: "Command to override the lint command"
        default: lint
        type: string
      format-command:
        description: "Command to override the format command"
        default: format
        type: string
      test-storybook-command:
        description: "Command to override the test-storybook command"
        default: test-storybook
        type: string
      check-types-command:
        description: "Command to override the check-types command"
        default: check-types
        type: string
      skip-build:
        description: "If the build step should skipped"
        default: false
        type: boolean
      skip-test:
        description: "If the test step should skipped"
        default: false
        type: boolean
      skip-lint:
        description: "If the lint step should skipped"
        default: false
        type: boolean
      skip-format:
        description: "If the format step should skipped"
        default: false
        type: boolean
      skip-test-storybook:
        description: "If the test-storybook step should skipped"
        default: false
        type: boolean
      skip-check-types:
        description: "If the check-types step should skipped"
        default: false
        type: boolean
      skip-cache:
        description: "If the cache should be skipped when installing dependencies"
        default: false
        type: boolean
      pre-install-commands:
        description: "Commands to run before dependency installation (e.g., configure registries, auth tokens)"
        default: ""
        type: string
      debug:
        description: "If debug flags should be set"
        default: false
        type: boolean
      fetch-depth:
        description: "Number of commits to fetch. 0 indicates all history for all branches and tags"
        default: 1
        type: number
      pre-test-command:
        description: >-
          A script to run before the test checks (e.g., generate:types for code generation).
          Runs as: <package-manager> run <command>
        default: ""
        type: string
      node-options:
        description: "Value for NODE_OPTIONS environment variable (e.g., --max-old-space-size=4096)"
        default: ""
        type: string

jobs:
  install:
    name: 🧶 Install
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          package-manager-cache: false
          node-version-file: .nvmrc
      - name: Enable Corepack
        run: |
          # Enable corepack if packageManager is specified in package.json
          if [ -f package.json ] && jq -e '.packageManager' package.json > /dev/null 2>&1; then
            echo "packageManager field detected in package.json, enabling corepack"
            corepack enable
          fi
      - name: Configure Dependency Cache
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache: ${{ inputs.package-manager }}
          node-version-file: .nvmrc
      - name: Install safe-chain
        run: |
          SAFE_CHAIN_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
          curl -fsSL "$SAFE_CHAIN_URL" | sh -s -- --ci
      - name: Setup additional environment variables
        if: inputs.has-env-vars
        run: |
          # Parse and set additional environment variables securely
          # Supports multiline values (e.g., SSH keys)
          current_key=""
          current_value=""
          flush_var() {
            if [ -n "$current_key" ]; then
              while IFS= read -r mask_line; do
                [ -n "$mask_line" ] && echo "::add-mask::${mask_line}"
              done <<< "${current_value}"
              echo "Setting environment variable: ${current_key}"
              echo "${current_key}<<GHENV_EOF" >> $GITHUB_ENV
              echo "${current_value}" >> $GITHUB_ENV
              echo "GHENV_EOF" >> $GITHUB_ENV
            fi
          }
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              flush_var
              current_key="${line%%=*}"
              current_value="${line#*=}"
            elif [ -n "$current_key" ]; then
              current_value="$(printf '%s\n%s' "${current_value}" "${line}")"
            fi
          done <<< "${{ secrets.ENV_VARS }}"
          flush_var
      - name: Run pre-install commands
        if: inputs.pre-install-commands != ''
        run: |
          # Execute pre-install commands line by line
          echo "${INPUTS_PRE_INSTALL_COMMANDS}" | while IFS= read -r cmd; do
            if [ -n "$cmd" ]; then
              echo "Running: $cmd"
              eval "$cmd"
            fi
          done
        env:
          INPUTS_PRE_INSTALL_COMMANDS: ${{ inputs.pre-install-commands }}
      - name: Install dependencies
        run: |
          debug=${{ inputs.debug && '--verbose' || '' }}
          if [ "${INPUTS_PACKAGE_MANAGER}" = "yarn" ]; then
            lock_dependencies=${{ inputs.is-yarn-classic && '--frozen-lockfile' || '--immutable' }}
            skip_cache=${{ inputs.skip-cache && '--force' || '' }}

            yarn config get nodeLinker
            yarn install $lock_dependencies $skip_cache $debug
          else
            npm ci $debug
          fi

        env:
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}

      # Use tar to store cache so file permissions are maintained (https://github.com/actions/upload-artifact/issues/38)
      - name: Archive node_modules with tar
        run: tar -czf node_modules.tar.gz -C . node_modules/
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: node_modules
          path: node_modules.tar.gz
          retention-days: 1

  build:
    name: 🏗️ Build
    needs: [install]
    if: inputs.skip-build == false
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          # Enable corepack if packageManager is specified in package.json
          if [ -f package.json ] && jq -e '.packageManager' package.json > /dev/null 2>&1; then
            echo "packageManager field detected in package.json, enabling corepack"
            corepack enable
          fi
      - name: Configure Dependency Cache
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache: ${{ inputs.package-manager }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: node_modules
      - name: Extract node_modules with tar
        run: tar -xvzf node_modules.tar.gz -C .
      - name: Setup additional environment variables
        if: inputs.has-env-vars
        run: |
          # Parse and set additional environment variables securely
          # Supports multiline values (e.g., SSH keys)
          current_key=""
          current_value=""
          flush_var() {
            if [ -n "$current_key" ]; then
              while IFS= read -r mask_line; do
                [ -n "$mask_line" ] && echo "::add-mask::${mask_line}"
              done <<< "${current_value}"
              echo "Setting environment variable: ${current_key}"
              echo "${current_key}<<GHENV_EOF" >> $GITHUB_ENV
              echo "${current_value}" >> $GITHUB_ENV
              echo "GHENV_EOF" >> $GITHUB_ENV
            fi
          }
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              flush_var
              current_key="${line%%=*}"
              current_value="${line#*=}"
            elif [ -n "$current_key" ]; then
              current_value="$(printf '%s\n%s' "${current_value}" "${line}")"
            fi
          done <<< "${{ secrets.ENV_VARS }}"
          flush_var

      - name: Register problem matchers
        uses: aligent/workflows/.github/actions/node-problem-matchers@main

      - name: Check build command exists
        id: check-build
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.build-command }}

      - name: Build (script)
        if: steps.check-build.outputs.exists-script == 'true'
        run: ${INPUTS_PACKAGE_MANAGER} run ${INPUTS_BUILD_COMMAND} ${{ inputs.debug && '--verbose' || '' }}
        env:
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
          INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}

      - name: Fetch all commits for Nx
        if: steps.check-build.outputs.exists-script != 'true' && steps.check-build.outputs.exists-nx-target == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build (nx)
        if: steps.check-build.outputs.exists-script != 'true' && steps.check-build.outputs.exists-nx-target == 'true'
        run: npx nx run-many -t ${INPUTS_BUILD_COMMAND} ${{ inputs.debug && '--verbose' || '' }}
        env:
          INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}

      - name: Skip build (command not found)
        if: steps.check-build.outputs.exists-script != 'true' && steps.check-build.outputs.exists-nx-target != 'true'
        run: echo "Build command '${INPUTS_BUILD_COMMAND}' not found, skipping"
        env:
          INPUTS_BUILD_COMMAND: ${{ inputs.build-command }}

      - name: Remove problem matchers
        if: always()
        uses: aligent/workflows/.github/actions/node-problem-matchers@main
        with:
          action: remove

  test:
    name: 🧪 Pull Request Checks
    needs: [install]
    if: >-
      inputs.skip-test == false ||
      inputs.skip-lint == false ||
      inputs.skip-format == false ||
      inputs.skip-test-storybook == false ||
      inputs.skip-check-types == false
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_OPTIONS: ${{ inputs.node-options }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          # Enable corepack if packageManager is specified in package.json
          if [ -f package.json ] && jq -e '.packageManager' package.json > /dev/null 2>&1; then
            echo "packageManager field detected in package.json, enabling corepack"
            corepack enable
          fi
      - name: Configure Dependency Cache
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache: ${{ inputs.package-manager }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: node_modules
      - name: Extract node_modules with tar
        run: tar -xvzf node_modules.tar.gz -C .
      - name: Setup additional environment variables
        if: inputs.has-env-vars
        run: |
          # Parse and set additional environment variables securely
          # Supports multiline values (e.g., SSH keys)
          current_key=""
          current_value=""
          flush_var() {
            if [ -n "$current_key" ]; then
              while IFS= read -r mask_line; do
                [ -n "$mask_line" ] && echo "::add-mask::${mask_line}"
              done <<< "${current_value}"
              echo "Setting environment variable: ${current_key}"
              echo "${current_key}<<GHENV_EOF" >> $GITHUB_ENV
              echo "${current_value}" >> $GITHUB_ENV
              echo "GHENV_EOF" >> $GITHUB_ENV
            fi
          }
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              flush_var
              current_key="${line%%=*}"
              current_value="${line#*=}"
            elif [ -n "$current_key" ]; then
              current_value="$(printf '%s\n%s' "${current_value}" "${line}")"
            fi
          done <<< "${{ secrets.ENV_VARS }}"
          flush_var

      - name: Run pre-test command
        if: inputs.pre-test-command != ''
        run: ${INPUTS_PACKAGE_MANAGER} run ${INPUTS_PRE_TEST_COMMAND}
        env:
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
          INPUTS_PRE_TEST_COMMAND: ${{ inputs.pre-test-command }}

      - name: Check test command exists
        id: check-test
        if: inputs.skip-test == false
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.test-command }}

      - name: Check lint command exists
        id: check-lint
        if: inputs.skip-lint == false
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.lint-command }}

      - name: Check format command exists
        id: check-format
        if: inputs.skip-format == false
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.format-command }}

      - name: Check test-storybook command exists
        id: check-test-storybook
        if: inputs.skip-test-storybook == false
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.test-storybook-command }}

      - name: Check check-types command exists
        id: check-check-types
        if: inputs.skip-check-types == false
        uses: aligent/workflows/.github/actions/command-exists@main
        with:
          command: ${{ inputs.check-types-command }}

      - name: Fetch all commits for Nx
        if: >-
          steps.check-check-types.outputs.exists-script != 'true' &&
          steps.check-check-types.outputs.exists-nx-target == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build commands list
        id: build-commands
        run: |
          commands=()
          if [ "${{ inputs.skip-test }}" != "true" ] && [ "${STEPS_CHECK_TEST_OUTPUTS_EXISTS}" == "true" ]; then
            commands+=("${INPUTS_TEST_COMMAND}")
          fi
          if [ "${{ inputs.skip-lint }}" != "true" ] && [ "${STEPS_CHECK_LINT_OUTPUTS_EXISTS}" == "true" ]; then
            commands+=("${INPUTS_LINT_COMMAND}")
          fi
          if [ "${{ inputs.skip-format }}" != "true" ] && [ "${STEPS_CHECK_FORMAT_OUTPUTS_EXISTS}" == "true" ]; then
            commands+=("${INPUTS_FORMAT_COMMAND}")
          fi
          if [ "${{ inputs.skip-test-storybook }}" != "true" ] && \
             [ "${STEPS_CHECK_TEST_STORYBOOK_OUTPUTS_EXISTS}" == "true" ]; then
            # Ensure playwright dependencies are installed before story blok test execution begins 
            if [ "${INPUTS_PACKAGE_MANAGER}" = "yarn" ]; then
              yarn playwright install --with-deps
            else
              npx playwright install --with-deps
            fi
            commands+=("${INPUTS_TEST_STORYBOOK_COMMAND}")
          fi
          if [ "${{ inputs.skip-check-types }}" != "true" ] && \
             [ "${STEPS_CHECK_CHECK_TYPES_OUTPUTS_EXISTS}" == "true" ]; then
            commands+=("${INPUTS_CHECK_TYPES_COMMAND}")
          fi
          # Convert to JSON array
          json=$(printf '%s\n' "${commands[@]}" | jq -R . | jq -s -c .)
          echo "commands=$json" >> $GITHUB_OUTPUT
        env:
          STEPS_CHECK_TEST_OUTPUTS_EXISTS: ${{ steps.check-test.outputs.exists }}
          INPUTS_TEST_COMMAND: ${{ inputs.test-command }}
          STEPS_CHECK_LINT_OUTPUTS_EXISTS: ${{ steps.check-lint.outputs.exists }}
          INPUTS_LINT_COMMAND: ${{ inputs.lint-command }}
          STEPS_CHECK_FORMAT_OUTPUTS_EXISTS: ${{ steps.check-format.outputs.exists }}
          INPUTS_FORMAT_COMMAND: ${{ inputs.format-command }}
          STEPS_CHECK_TEST_STORYBOOK_OUTPUTS_EXISTS: ${{ steps.check-test-storybook.outputs.exists }}
          INPUTS_PACKAGE_MANAGER: ${{ inputs.package-manager }}
          INPUTS_TEST_STORYBOOK_COMMAND: ${{ inputs.test-storybook-command }}
          STEPS_CHECK_CHECK_TYPES_OUTPUTS_EXISTS: ${{ steps.check-check-types.outputs.exists }}
          INPUTS_CHECK_TYPES_COMMAND: ${{ inputs.check-types-command }}

      - name: Run checks concurrently
        uses: aligent/workflows/.github/actions/run-checks@main
        with:
          package-manager: ${{ inputs.package-manager }}
          debug: ${{ inputs.debug }}
          commands: ${{ steps.build-commands.outputs.commands }}
