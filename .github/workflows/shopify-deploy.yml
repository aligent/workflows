name: Deploy to Shopify

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for the app'
        required: false
        type: string
        default: '.'
      shopify-toml-name:
        description: 'Name of Shopify TOML file'
        required: true
        type: string

    secrets:
      shopify_cli_token:
        description: 'Shopify CLI authentication token'
        required: true

jobs:
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: ${{ inputs.working-directory }}/yarn.lock

      - name: Install safe-chain
        run: |
          SAFE_CHAIN_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
          curl -fsSL "$SAFE_CHAIN_URL" | sh -s -- --ci

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: yarn install --frozen-lockfile

      - name: Configure Shopify CLI
        working-directory: ${{ inputs.working-directory }}
        run: yarn shopify app config use ${SHOPIFY_TOML_NAME}
        env:
          SHOPIFY_TOML_NAME: ${{ inputs.shopify-toml-name }}

      - name: Deploy to Shopify
        working-directory: ${{ inputs.working-directory }}
        run: yarn shopify app deploy --allow-updates
        env:
          SHOPIFY_CLI_TOKEN: ${{ secrets.shopify_cli_token }}
          SHOPIFY_FLAG_PATH: ${{ inputs.working-directory }}
