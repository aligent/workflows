name: Deploy to Shopify

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for the app'
        required: false
        type: string
        default: '.'
      shopify-toml-name:
        description: 'Name of Shopify TOML file'
        required: true
        type: string

      # Backport Configuration
      create-backport-pr:
        description: "Create a backport PR to staging after deployment"
        type: boolean
        default: false
      backport-target-branch:
        description: "Target branch for backport PR"
        type: string
        default: "staging"

    secrets:
      shopify_cli_token:
        description: 'Shopify CLI authentication token'
        required: true

jobs:
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: ${{ inputs.working-directory }}/yarn.lock

      - name: Install safe-chain
        run: |
          SAFE_CHAIN_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
          curl -fsSL "$SAFE_CHAIN_URL" | sh -s -- --ci

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: yarn install --frozen-lockfile

      - name: Configure Shopify CLI
        working-directory: ${{ inputs.working-directory }}
        run: yarn shopify app config use ${SHOPIFY_TOML_NAME}
        env:
          SHOPIFY_TOML_NAME: ${{ inputs.shopify-toml-name }}

      - name: Deploy to Shopify
        working-directory: ${{ inputs.working-directory }}
        run: yarn shopify app deploy --allow-updates
        env:
          SHOPIFY_CLI_TOKEN: ${{ secrets.shopify_cli_token }}
          SHOPIFY_FLAG_PATH: ${{ inputs.working-directory }}

      - name: Backport to staging
        if: success() && inputs.create-backport-pr
        uses: aligent/workflows/.github/actions/backport@main
        with:
          target-branch: ${{ inputs.backport-target-branch }}
