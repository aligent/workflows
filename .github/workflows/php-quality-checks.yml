              --log-junit ./test-results/rest-api-report.xml \
              --testsuite="REST API Tests" \
              $debug
          else
            echo "❌ PHPUnit not found in vendor/bin/"
            exit 1
          fi

          # Kill the PHP server if it was started
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi
        env:
          INPUTS_MEMORY_LIMIT: ${{ inputs.memory-limit }}
          INPUTS_DEBUG: ${{ inputs.debug }}

